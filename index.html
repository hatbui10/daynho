<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tô dãy đúng độ dài</title>

<style>
body {
    background: #020617;
    color: white;
    text-align: center;
    font-family: Arial;
}

input, button {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

button {
    background: #334155;
    color: white;
}

.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, 40px);
    gap: 6px;
    justify-content: center;
}

.cell {
    width: 40px;
    height: 40px;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
}

.highlight {
    background: #facc15;
    color: black;
}
</style>
</head>

<body>

<h2>Tô dãy đúng độ dài 😵‍💫</h2>

<input type="file" id="fileInput">
<input type="number" id="n" placeholder="Nhập độ dài n">

<br>

<button onclick="setMode('A')">Tô dãy A (≥5)</button>
<button onclick="setMode('B')">Tô dãy B (&lt;5)</button>
<div id="count" style="margin-top:10px; font-size:18px; color:#22c55e;">
Tổng số: 0
</div>

<div class="grid" id="grid"></div>

<script>
let data = [];
let mode = "A";

// load file
document.getElementById("fileInput").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();

    reader.onload = function(e) {
        let text = e.target.result;
        data = text.replace(/[^0-9]/g, "").split("");
        document.getElementById("count").innerText = "Tổng số: " + data.length;

        localStorage.setItem("data", JSON.stringify(data));
        render(data);
    };

    reader.readAsText(file);
});

// đổi mode
function setMode(m) {
    mode = m;
    localStorage.setItem("mode", mode);

    if (data.length > 0) render(data);
}

function render(arr) {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    let cells = [];

    arr.forEach((num) => {
        let div = document.createElement("div");
        div.className = "cell";
        div.innerText = num;

        cells.push(div);
        grid.appendChild(div);
    });

    let n = parseInt(document.getElementById("n").value);

    if (!n) return;

    let start = 0;

    for (let i = 0; i <= arr.length; i++) {

        let currentType = (i < arr.length)
            ? (parseInt(arr[i]) < 5 ? "B" : "A")
            : null;

        let startType = parseInt(arr[start]) < 5 ? "B" : "A";

        if (currentType !== startType) {

            let length = i - start;

            // CHỈ tô nếu đúng độ dài n
            if (startType === mode && length >= n) {
    for (let j = start; j < start + n; j++) {
        cells[j].classList.add("highlight");
    }
}
            start = i;
        }
    }
}

// load lại
window.onload = function() {
    let savedData = JSON.parse(localStorage.getItem("data") || "[]");
    let savedMode = localStorage.getItem("mode");

    if (savedData.length > 0) data = savedData;
    if (savedMode) mode = savedMode;

    if (data.length > 0) render(data);
    if (data.length > 0) {
    document.getElementById("count").innerText = "Tổng số: " + data.length;
}
}
</script>

</body>
</html>
